<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <title>0-60 Timer</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: Arial, sans-serif; display: flex; margin: 0; }
    #sidebar { width: 30%; background: #111; color: white; padding: 10px; overflow-y: auto; }
    #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    button { padding: 10px 20px; margin: 10px; font-size: 16px; }
    #timer { font-size: 48px; margin: 20px; }
    .lap { border-bottom: 1px solid #444; padding: 5px; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h3>Recent Runs</h3>
    <div id="laps"></div>
  </div>
  <div id="main">
    <div id="timer">0.00 s</div>
    <button onclick="startRun()">Start</button>
    <button onclick="saveAsImage()">Save as JPG</button>
  </div>

<script>
let watchId = null;
let startTime = null;
let running = false;

// --- GPS smoothing buffer ---
const speedBuffer = [];
const BUFFER_SIZE = 5; // increase = smoother but more delay

function getSmoothedSpeed(newSpeedMps) {
  const mph = newSpeedMps * 2.23694;

  speedBuffer.push(mph);
  if (speedBuffer.length > BUFFER_SIZE) {
    speedBuffer.shift();
  }

  const sum = speedBuffer.reduce((a, b) => a + b, 0);
  return sum / speedBuffer.length;
}

function startRun() {
  if (running) return;

  startTime = null;
  running = true;
  speedBuffer.length = 0; // reset smoothing

  watchId = navigator.geolocation.watchPosition(pos => {
    const rawSpeed = pos.coords.speed;
    if (rawSpeed === null) return;

    const speedMph = getSmoothedSpeed(rawSpeed);

    // Start when actual movement begins (smoothed)
    if (!startTime && speedMph > 1) {
      startTime = performance.now();
    }

    if (startTime) {
      const elapsed = (performance.now() - startTime) / 1000;
      document.getElementById("timer").innerText = elapsed.toFixed(2) + " s";

      if (speedMph >= 60) {
        finishRun(elapsed);
      }
    }

  }, err => {
    alert("GPS error: " + err.message);
  }, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 5000
  });
}

function finishRun(time) {
  running = false;
  navigator.geolocation.clearWatch(watchId);

  const lapDiv = document.createElement("div");
  lapDiv.className = "lap";
  lapDiv.innerText = time.toFixed(2) + " s";
  document.getElementById("laps").prepend(lapDiv);
}

function saveAsImage() {
  const canvas = document.createElement("canvas");
  canvas.width = 400;
  canvas.height = 200;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "40px Arial";
  ctx.fillText(document.getElementById("timer").innerText, 20, 100);

  const link = document.createElement("a");
  link.download = "0-60-time.jpg";
  link.href = canvas.toDataURL("image/jpeg");
  link.click();
}

// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js');
  });
}
</script>
</body>
</html>
